name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff bandit pip-audit
        
    - name: Lint with Ruff
      run: ruff check .
      
    - name: Security scan (Bandit)
      run: bandit -r app/ -c .bandit.yml || true
      
    - name: Dependency vulnerability scan (pip-audit)
      run: pip-audit || true
      
    - name: Run Tests
      run: pytest tests/ -v
      
  build-docker:
    needs: test-backend
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Backend Image
      run: docker build -t shoe-backend-prod ./backend
      
    - name: Build Client Image
      run: docker build -t shoe-client-prod ./frontend/client

    - name: Build Admin Image
      run: docker build -t shoe-admin-prod ./frontend/admin
